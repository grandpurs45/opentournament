services:
  opentournament:
    container_name: opentournament
    build: .
    ports:
      - "${HTTP_PORT:-8080}:80"
    environment:
      APP_ENV: production
      APP_URL: ${APP_URL:-http://localhost:${HTTP_PORT:-8080}}
      SQLITE_PATH: /var/www/html/data/opentournament.sqlite
    volumes:
      - opentournament_data:/var/www/html/data
    restart: unless-stopped

volumes:
  opentournament_data:
